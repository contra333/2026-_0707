sources:
  pytorch_optimizers:
    title: PyTorch optimizer API reference
    url: https://pytorch.org/docs/stable/optim.html
    accessed: 2026-07-07
    role: optimizer_semantics_reference
  pytorch_reproducibility:
    title: PyTorch reproducibility notes
    url: https://docs.pytorch.org/docs/stable/notes/randomness.html
    accessed: 2026-07-13
    role: training seed, DataLoader generator, and deterministic-environment reference
  pytorch_deterministic_algorithms:
    title: torch.use_deterministic_algorithms API reference
    url: https://docs.pytorch.org/docs/stable/generated/torch.use_deterministic_algorithms.html
    accessed: 2026-07-13
    role: strict deterministic CUDA operation support and failure boundary
  pytorch_module_cuda:
    title: torch.nn.Module API reference
    url: https://docs.pytorch.org/docs/stable/generated/torch.nn.Module.html
    accessed: 2026-07-13
    role: model device transfer before optimizer construction
  local_optimizer_reference_card:
    path: docs/reference_cards/01_optimizers.md
    role: optimizer_implementation_reference
  local_architecture_reference_card:
    path: docs/reference_cards/02_architectures.md
    role: architecture_implementation_reference
  local_feature_ood_detector_reference_card:
    path: docs/reference_cards/06_feature_ood_detectors.md
    role: feature_detector_semantics_reference; documentation only until a later implementation PR
  vgg16_paper:
    title: Very Deep Convolutional Networks for Large-Scale Image Recognition
    authors: Simonyan and Zisserman
    stable_source: arXiv:1409.1556
    url: https://arxiv.org/abs/1409.1556
    role: VGG-16 architecture reference; planned backbone, not currently implemented
  resnet_paper:
    title: Deep Residual Learning for Image Recognition
    authors: He, Zhang, Ren, and Sun
    stable_source: arXiv:1512.03385
    url: https://arxiv.org/abs/1512.03385
    role: ResNet architecture reference; implemented ResNet18 backbone
  wide_resnet_paper:
    title: Wide Residual Networks
    authors: Zagoruyko and Komodakis
    stable_source: arXiv:1605.07146
    url: https://arxiv.org/abs/1605.07146
    role: WRN-28-10 architecture reference; implemented backbone
  wide_resnet_official_repository:
    repository: szagoruyko/wide-residual-networks
    url: https://github.com/szagoruyko/wide-residual-networks
    commit: ae6d0d0561484172790c7a63c8ce6ade5a5a2914
    files:
      - pytorch/resnet.py
      - models/wide-resnet.lua
    accessed: 2026-07-13
    role: pinned projection-shortcut and dropout-placement implementation reference
  convnext_paper:
    title: A ConvNet for the 2020s
    authors: Liu, Mao, Wu, Feichtenhofer, Darrell, and Xie
    stable_source: arXiv:2201.03545
    url: https://arxiv.org/abs/2201.03545
    role: ConvNeXt architecture reference; planned ConvNeXt-Tiny backbone, not currently implemented
  torchvision_models_docs:
    title: TorchVision models documentation
    url: https://pytorch.org/vision/stable/models.html
    accessed: 2026-07-07
    role: optional implementation reference only; does not imply project models are implemented
  torchvision_feature_extraction_docs:
    title: TorchVision feature extraction documentation
    url: https://pytorch.org/vision/stable/feature_extraction.html
    accessed: 2026-07-07
    role: optional implementation reference for inspection; final project models must directly support return_features=True
  openood_v1_5_paper:
    title: "OpenOOD v1.5: Enhanced Benchmark for Out-of-Distribution Detection"
    stable_source: arXiv:2306.09301v5
    url: https://arxiv.org/abs/2306.09301v5
    role: CIFAR-10 OOD benchmark protocol reference; not optimizer, geometry, or DDU estimator authority
  openood_v1_5_repository:
    repository: Jingkang50/OpenOOD
    url: https://github.com/Jingkang50/OpenOOD
    commit: 3c35632ee91b54b09d1f085d04f94744cece7d0b
    role: pinned dataset, preprocessing, grouping, and metric compatibility source
  ddu_paper:
    title: "Deep Deterministic Uncertainty: A New Simple Baseline"
    authors: Mukhoti, Kirsch, van Amersfoort, Torr, and Gal
    stable_source: arXiv:2102.11582
    url: https://arxiv.org/abs/2102.11582
    role: original DDU method reference; class-wise GDA feature density and marginal likelihood
  ddu_official_repository:
    repository: omegafragger/DDU
    url: https://github.com/omegafragger/DDU
    commit: f597744c65df4ff51615ace5e86e82ffefe1cd0f
    files:
      - utils/gmm_utils.py
      - evaluate.py
      - metrics/uncertainty_confidence.py
      - metrics/ood_metrics.py
      - net/wide_resnet.py
    accessed: 2026-07-14
    role: pinned DDU implementation reference for class-wise unbiased covariance, adaptive shared jitter, MultivariateNormal log density, and logsumexp scoring
