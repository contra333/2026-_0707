  local_optimizer_reference_card:
    path: docs/reference_cards/01_optimizers.md
    role: optimizer_implementation_reference
  local_architecture_reference_card:
    path: docs/reference_cards/02_architectures.md
    role: architecture_implementation_reference
  local_feature_ood_detector_reference_card:
    path: docs/reference_cards/06_feature_ood_detectors.md
    role: feature_detector_semantics_reference; documentation only until a later implementation PR
  local_optimizer_hpo_protocol_reference_card:
    path: docs/reference_cards/07_optimizer_comparison_hpo_protocol.md
    role: WRN-28-10 four-optimizer HPO and comparison protocol; documentation only until a later implementation PR
  local_raw_feature_artifact_reference_card:
    path: docs/reference_cards/08_raw_feature_artifact_contract.md
    role: raw checkpoint-feature artifact, provenance, checksum, and protected-split reference
  local_core_representation_metrics_reference_card:
    path: docs/reference_cards/09_core_representation_metrics.md
    role: frozen confirmatory representation-metric and low-complexity detector reference; documentation only until later implementation PRs
  adam_paper:
    title: "Adam: A Method for Stochastic Optimization"
    authors: Kingma and Ba
    stable_source: arXiv:1412.6980
    url: https://arxiv.org/abs/1412.6980
    accessed: 2026-07-14
    role: primary Adam update reference; does not validate this project's HPO ranges or budgets
  decoupled_weight_decay_paper:
    title: Decoupled Weight Decay Regularization
    authors: Loshchilov and Hutter
    stable_source: arXiv:1711.05101
    url: https://arxiv.org/abs/1711.05101
    accessed: 2026-07-14
    role: primary decoupled weight decay reference; does not imply equal effective regularization at shared numeric weight decay
  random_search_hpo_paper:
    title: Random Search for Hyper-Parameter Optimization
    authors: Bergstra and Bengio
    stable_source: JMLR 13 (2012), 281-305
    url: https://www.jmlr.org/papers/v13/bergstra12a.html
    accessed: 2026-07-14
    role: general random-search HPO rationale; does not validate this project's numeric ranges, trial budget, or seeds
  vgg16_paper:
    title: Very Deep Convolutional Networks for Large-Scale Image Recognition
    authors: Simonyan and Zisserman
    stable_source: arXiv:1409.1556
    url: https://arxiv.org/abs/1409.1556
    role: VGG-16 architecture reference; planned backbone, not currently implemented
  resnet_paper:
    title: Deep Residual Learning for Image Recognition
    authors: He, Zhang, Ren, and Sun
    stable_source: arXiv:1512.03385
    url: https://arxiv.org/abs/1512.03385
    role: ResNet architecture reference; implemented ResNet18 backbone
  wide_resnet_paper:
    title: Wide Residual Networks
    authors: Zagoruyko and Komodakis
    stable_source: arXiv:1605.07146
    url: https://arxiv.org/abs/1605.07146
    role: WRN-28-10 architecture reference; implemented backbone
  wide_resnet_official_repository:
    repository: szagoruyko/wide-residual-networks
