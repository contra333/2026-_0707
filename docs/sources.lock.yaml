    role: optimizer_semantics_reference
  pytorch_reproducibility:
    title: PyTorch reproducibility notes
    url: https://docs.pytorch.org/docs/stable/notes/randomness.html
    accessed: 2026-07-13
    role: training seed, DataLoader generator, and deterministic-environment reference
  pytorch_deterministic_algorithms:
    title: torch.use_deterministic_algorithms API reference
    url: https://docs.pytorch.org/docs/stable/generated/torch.use_deterministic_algorithms.html
    accessed: 2026-07-13
